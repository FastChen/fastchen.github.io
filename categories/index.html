  let theme = 'light';
  
  if (savedTheme === 'dark') {
      theme = 'dark';
  } else if (savedTheme === 'auto') {
      // 检测系统偏好
      if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          theme = 'dark';
      }
  }
  
  // 立即设置主题
  document.documentElement.setAttribute('data-bs-theme', theme);
</script>
